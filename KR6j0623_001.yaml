body:
  text: 東晉竺曇無蘭譯佛在摩竭國因沙奪山中時佛子羅云隨佛在山中羅云夜臥為鬼神所嬈驚起明日至佛所為佛作禮却在一面樹下坐羅云以手扶頰低頭不樂默然不語佛即問羅云何以低頭如畏怖狀羅云言我昨日夜臥為鬼神所嬈佛語羅云天下或生人嬈人或山神嬈人或道溝邊鬼神嬈人或善死鬼神嬈人來欲試人經道恐人欲知其心堅濡佛語羅云汝取佛辟鬼神呪後儻有鬼神來嬈汝者持是鬼神名字以慈心説之阿波竭證證竭無多薩憘遲比遲沾波沾波迦羅準維陵無因輪無指輪無漢沙無因登羅宋林羅和林羅波耶越羅檀特羅佛言是檀特羅經佛故為諸弟子結恩經佛告諸弟子有急者當讀之鬼神儻來嬈人者當持慈心哀心淨還自視五藏思念五藏佛説是經時日月尚有墮地佛語終不有異今佛説是檀特羅經以説生人欲來嬈人者不得嬈人山神亦不得嬈人道溝邊鬼神亦不得嬈人腥死鬼神亦不得嬈人善死鬼神亦不得嬈人聞是語火為不然食飯得毒毒為不行欲殺人刀為不向溺深水中為不沒難群有四子人行空間處若行縣邑中大國中若對會若大坐中耆老中伴侶中步行中坐臥中值有蠱道家者向讀是經蠱道為不行佛即為羅云説使羅云為諸比丘比丘尼優婆塞優婆夷及諸白衣皆令諷誦之
